server:
  port: 8811

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/db_users?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASS:vevui123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

jwt:
  secret: ${JWT_SECRET:vevui-super-secret-key-for-jwt-authentication-2024-please-change-in-production}
  access-token-expiration: 86400000    # 24 hours
  refresh-token-expiration: 604800000  # 7 days

# SMTP Gmail — dùng App Password (Google Account > Security > 2FA > App Passwords)
# Set env vars: MAIL_USERNAME, MAIL_PASSWORD
spring.mail:
  host: smtp.gmail.com
  port: 587
  username: ${MAIL_USERNAME:}
  password: ${MAIL_PASSWORD:}
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true

otp:
  expiration-minutes: 5

management:
  endpoints:
    web:
      exposure:
        include: health, info

logging:
  level:
    com.vevui.userservice: DEBUG
    org.springframework.security: WARN
